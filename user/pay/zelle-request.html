<!DOCTYPE html><html lang="en" class="isPWA"><head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3135">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Request with Zelle® | Alliance Federal Credit Union</title>

    <link rel="stylesheet" type="text/css" href="/assets/app/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="/assets/app/css/style.css">

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://rsms.me" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/hung1001/font-awesome-pro@4cac1a6/css/all.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://rsms.me/inter/inter.css"></noscript>

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/logo.png">
</head>
<body>
    <div class="menu-hider"></div>

    <div id="page" class="ms-page-wrap device-is-android" data-swup="0">

        <div class="header bg_white_color is-fixed" style="background-color: #2c3135;">
            <div class="tf-container">
                <div class="tf-statusbar d-flex justify-content-center align-items-center">
                    <a href="/user/zelle-pay" class="back-btn color-white"><i class="fas fa-arrow-left"></i></a>
                    <div class="header-title header-subtitle color-white">Request with Zelle®</div>
                </div>
            </div>
        </div>

        <div class="w-form">
            <form id="transfer-form" data-kind="zelle" method="post" action="/api/transfers" novalidate>
                <input type="hidden" name="mode" value="request">
                <div id="sectionInput" class="ms-container">

                    <div style="margin-top: 20px;">
                        <label for="tf-from" class="ms-input-label">Deposit to</label>
                        <div class="ms-input-wrap">
                            <select id="tf-from" name="account_id" class="ms-input w-select" required>
                                <option value="">Select Account…</option>
                            </select>
                            <div class="ms-select-svg w-embed"><svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 0 24 24" width="32px" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"></path><path d="M8.71 11.71l2.59 2.59c.39.39 1.02.39 1.41 0l2.59-2.59c.63-.63.18-1.71-.71-1.71H9.41c-.89 0-1.33 1.08-.7 1.71z"></path></svg></div>
                        </div>
                        <div class="ms-help-text" id="tf-balance"></div>
                    </div>

                    <div>
                        <label for="tf-contact" class="ms-input-label">Request from (email or U.S. mobile)</label>
                        <input id="tf-contact" type="text" class="ms-input w-input" name="contact" placeholder="name@email.com or (555) 555-5555" required>
                    </div>

                    <div>
                        <label for="tf-amount" class="ms-input-label">Amount (USD)</label>
                        <div class="ms-input-wrap">
                            <input id="tf-amount" type="number" step="0.01" min="0.01" inputmode="decimal" class="ms-input has-left-icon w-input" name="amount" placeholder="0.00" required>
                            <div class="ms-svg is-left w-embed"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"></path><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.42 0 2.13.54 2.39 1.4.12.4.45.7.87.7h.3c.66 0 1.13-.65.9-1.27-.42-1.18-1.4-2.16-2.96-2.54V4.5c0-.83-.67-1.5-1.5-1.5S10 3.67 10 4.5v.66c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-1.65 0-2.5-.59-2.83-1.43-.15-.39-.49-.67-.9-.67h-.28c-.67 0-1.14.68-.89 1.3.57 1.39 1.9 2.21 3.4 2.53v.67c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-.65c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"></path></svg></div>
                        </div>
                    </div>

                    <div>
                        <label for="tf-desc" class="ms-input-label">Note (optional)</label>
                        <input id="tf-desc" type="text" class="ms-input w-input" name="desc" placeholder="What's this for?">
                    </div>

                    <div class="ms-form-error" id="tf-error" style="display:none;color:#c0392b;font-size:13px;margin:6px 0;"></div>

                    <div><button type="submit" class="ms-button is-small w-inline-block"><div>Request</div></button></div>

                </div>
            </form>
        </div>

    </div>

    <script type="text/javascript" src="/js/guard.js"></script>
    <script type="text/javascript" src="/js/app.js"></script>

<p class="offline-message bg-red-dark color-white">No internet connection detected</p><p class="online-message bg-green-dark color-white">You are back online</p></body></html>
