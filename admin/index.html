<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f6b3b">
  <title>Admin | Alliance Federal Credit Union</title>
  <link rel="apple-touch-icon" href="/assets/img/logo.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://rsms.me" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/hung1001/font-awesome-pro@4cac1a6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://rsms.me/inter/inter.css"></noscript>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "InterVariable", "Inter", "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; font-size: 14px; line-height: 20px; background: #eef1f0; color: #1c2723; font-feature-settings: "liga" 1, "calt" 1; -webkit-font-smoothing: antialiased; }
    a { color: inherit; }
    .topbar { display: flex; align-items: center; gap: 12px; background: #0f6b3b; color: #fff; padding: 12px 18px; }
    .topbar img { height: 34px; }
    .topbar .sp { flex: 1; }
    .btn { border: 0; border-radius: 10px; padding: 9px 14px; font-weight: 650; font-size: 13px; line-height: 18px; cursor: pointer; font-family: inherit; }
    .btn-primary { background: #0f6b3b; color: #fff; }
    .btn-light { background: #fff; color: #0f6b3b; border: 1px solid #cfe0d7; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.5); }
    .btn:disabled { opacity: .55; cursor: default; }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; padding: 18px; max-width: 1200px; margin: 0 auto; align-items: start; }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.05); padding: 16px; }
    .card h3 { margin: 0 0 12px; font-size: 15px; }
    .userlist { list-style: none; margin: 0; padding: 0; max-height: 70vh; overflow: auto; }
    .userlist li { padding: 10px 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .userlist li:hover { background: #f2f6f4; }
    .userlist li.active { background: #e6f2ea; }
    .userlist .nm { font-weight: 600; font-size: 14px; }
    .userlist .un { color: #7a857f; font-size: 12px; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
    .badge.admin { background: #fff2d6; color: #a06b00; }
    .badge.off { background: #fdecea; color: #b3271e; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #384540; }
    .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #dbe2df; border-radius: 10px; font-size: 16px; line-height: 22px; font-family: inherit; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-flex { display: flex; align-items: center; gap: 8px; }
    .acct-row, .txn-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .acct-row input { padding: 8px 10px; }
    .txn-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eef1f0; font-size: 13px; }
    .txn-item .amt.pos { color: #1c7c3f; font-weight: 650; font-variant-numeric: tabular-nums; }
    .txn-item .amt.neg { color: #c0392b; font-weight: 650; font-variant-numeric: tabular-nums; }
    .muted { color: #7a857f; font-size: 12px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c2723; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 50; }
    .toast.show { opacity: 1; }
    .toast.err { background: #c0392b; }
    .empty { text-align: center; color: #9aa5a0; padding: 40px 0; }
    .section-title { font-size: 13px; font-weight: 700; margin: 18px 0 8px; color: #384540; }
    hr { border: 0; border-top: 1px solid #eef1f0; margin: 16px 0; }
    .avatar-edit { display: flex; align-items: center; gap: 14px; }
    .avatar-preview { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: #f2f6f4; border: 1px solid #dbe2df; flex: none; }
    .avatar-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .avatar-actions .btn { padding: 8px 12px; display: inline-block; }
    .hidden-file { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }
    .avatar-hint { margin-top: 6px; }
    .approvals-wrap { max-width: 1200px; margin: 0 auto; padding: 18px 18px 0; }
    .appr-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eef1f0; flex-wrap: wrap; }
    .appr-item:last-child { border-bottom: 0; }
    .appr-main { flex: 1; min-width: 220px; }
    .appr-kind { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; background: #eef4f1; color: #0f6b3b; padding: 2px 8px; border-radius: 20px; }
    .appr-meta { color: #7a857f; font-size: 12px; margin-top: 3px; }
    .appr-amt { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 15px; }
    .appr-amt.in { color: #1c7c3f; }
    .appr-amt.out { color: #c0392b; }
    .appr-actions { display: flex; gap: 8px; }
    .approvals-empty { color: #7a857f; font-size: 13px; padding: 6px 0; }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="/assets/img/logo-white.png" alt="Alliance Federal Credit Union">
    <strong style="font-weight:600;">Admin</strong>
    <span class="sp"></span>
    <span id="admin-name" class="muted" style="color:#dceee3;"></span>
    <button class="btn btn-ghost" id="logout-btn">Log out</button>
  </div>

  <div class="approvals-wrap">
    <div class="card" id="approvals-card">
      <div class="row-flex" style="justify-content:space-between;margin-bottom:8px;">
        <h3 style="margin:0;">Pending approvals <span id="approvals-count" class="badge admin" style="background:#fff2d6;color:#a06b00;"></span></h3>
        <button class="btn btn-light" id="approvals-refresh">Refresh</button>
      </div>
      <div id="approvals-list"><div class="approvals-empty">Loading…</div></div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="row-flex" style="justify-content:space-between;margin-bottom:12px;">
        <h3 style="margin:0;">Users</h3>
        <button class="btn btn-primary" id="new-user-btn">+ New</button>
      </div>
      <ul class="userlist" id="user-list"></ul>
    </div>

    <div class="card" id="editor">
      <div class="empty">Select a user to edit, or create a new one.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/admin.js"></script>
</body>
</html>
