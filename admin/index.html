<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f6b3b">
  <title>Admin | Alliance Federal Credit Union</title>
  <link rel="apple-touch-icon" href="/assets/img/logo.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://rsms.me" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/hung1001/font-awesome-pro@4cac1a6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://rsms.me/inter/inter.css"></noscript>
  <style>
    /* ---------- design tokens ---------- */
    :root {
      --bg: #f5f7f6;
      --card: #ffffff;
      --fg: #18211d;
      --muted: #f1f4f2;          /* neutral hover/fill */
      --muted-fg: #6a756f;
      --border: #e6eae8;
      --border-strong: #d8ddda;
      --primary: #0f6b3b;
      --primary-hover: #0c5c32;
      --primary-tint: #e9f3ed;   /* soft green (active nav) */
      --primary-tint-fg: #0d5a32;
      --danger: #d02f24;
      --danger-tint: #fbeae8;
      --success: #1a7f37;
      --warn-fg: #9a6a00;
      --warn-bg: #fbf1d6;
      --radius: 12px;
      --radius-sm: 9px;
      --radius-xs: 7px;
      --sidebar-w: 248px;
      --header-h: 56px;
      --shadow: 0 1px 2px rgba(16,40,28,.05);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "InterVariable", "Inter", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px; line-height: 20px; background: var(--bg); color: var(--fg);
      font-feature-settings: "liga" 1, "calt" 1; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    ::selection { background: var(--primary-tint); }

    /* ---------- app shell ---------- */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); flex: none; background: var(--card);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh; z-index: 60;
    }
    .sb-head { display: flex; align-items: center; gap: 10px; padding: 16px 18px 14px; }
    .sb-head img { height: 26px; width: auto; }
    .sb-head .tag {
      font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      color: var(--primary-tint-fg); background: var(--primary-tint); padding: 2px 7px; border-radius: 6px;
    }
    .sb-nav { padding: 6px 12px; display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: auto; }
    .sb-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted-fg); padding: 12px 10px 5px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px; padding: 9px 11px; border: 0; width: 100%;
      background: transparent; border-radius: var(--radius-sm); font-family: inherit;
      font-size: 13.5px; font-weight: 550; color: var(--fg); cursor: pointer; text-align: left;
    }
    .nav-item i { width: 17px; text-align: center; font-size: 14px; color: var(--muted-fg); }
    .nav-item:hover { background: var(--muted); }
    .nav-item.active { background: var(--primary-tint); color: var(--primary-tint-fg); }
    .nav-item.active i { color: var(--primary-tint-fg); }
    .nav-badge { margin-left: auto; min-width: 20px; text-align: center; background: var(--warn-bg);
      color: var(--warn-fg); font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
    .nav-badge:empty { display: none; }
    .sb-foot { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sb-foot .who { min-width: 0; flex: 1; }
    .sb-foot .who .nm { font-size: 13px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-foot .who .rl { font-size: 11px; color: var(--muted-fg); }
    .avatar-mini { width: 30px; height: 30px; border-radius: 50%; background: var(--primary-tint);
      color: var(--primary-tint-fg); display: grid; place-items: center; font-weight: 700; font-size: 12px; flex: none; }

    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      height: var(--header-h); display: flex; align-items: center; gap: 12px; padding: 0 20px;
      background: rgba(245,247,246,.82); backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30;
    }
    .page-title { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -.01em; }
    .topbar .sp { flex: 1; }
    .topbar .who-name { font-size: 13px; color: var(--muted-fg); }
    .menu-btn { display: none; width: 38px; height: 38px; border: 1px solid var(--border);
      background: var(--card); border-radius: var(--radius-sm); color: var(--fg); cursor: pointer; font-size: 15px; }
    .content { padding: 22px; width: 100%; max-width: 1180px; margin: 0 auto; }

    /* view switching */
    .view { display: none; }
    .view.active { display: block; animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

    /* ---------- buttons ---------- */
    .btn {
      border: 1px solid transparent; border-radius: var(--radius-sm); padding: 0 14px; height: 36px;
      font-weight: 600; font-size: 13px; line-height: 1; cursor: pointer; font-family: inherit;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px; white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn i { font-size: 12px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-light { background: var(--card); color: var(--fg); border-color: var(--border-strong); }
    .btn-light:hover { background: var(--muted); }
    .btn-danger { background: var(--danger-tint); color: var(--danger); }
    .btn-danger:hover { background: #f6d9d6; }
    .btn-sm { height: 32px; padding: 0 11px; font-size: 12.5px; }
    .btn:disabled { opacity: .5; cursor: default; }
    /* compact square icon buttons (remove rows / delete txn) */
    .btn.a-remove, .btn.r-remove, .btn.t-del { padding: 0; width: 36px; flex: none; }

    /* ---------- cards ---------- */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
    .card + .card { margin-top: 16px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .card h3 { margin: 0; font-size: 15px; font-weight: 650; letter-spacing: -.01em; }
    .card .sub { color: var(--muted-fg); font-size: 12.5px; line-height: 18px; margin: -6px 0 14px; }

    /* ---------- stat cards ---------- */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 16px; box-shadow: var(--shadow); }
    .stat .top { display: flex; align-items: center; justify-content: space-between; }
    .stat .lbl { font-size: 12px; color: var(--muted-fg); font-weight: 550; }
    .stat .ico { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 13px;
      background: var(--primary-tint); color: var(--primary-tint-fg); }
    .stat .val { font-size: 25px; font-weight: 750; margin-top: 10px; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .stat .hint { font-size: 11.5px; color: var(--muted-fg); margin-top: 3px; }

    /* ---------- users list ---------- */
    .users-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
    .userlist { list-style: none; margin: 0; padding: 0; max-height: 68vh; overflow: auto; }
    .userlist li { padding: 9px 11px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .userlist li:hover { background: var(--muted); }
    .userlist li.active { background: var(--primary-tint); }
    .userlist .nm { font-weight: 600; font-size: 13.5px; }
    .userlist .un { color: var(--muted-fg); font-size: 12px; }

    /* ---------- badges / pills ---------- */
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: .02em; }
    .badge.admin { background: var(--warn-bg); color: var(--warn-fg); }
    .badge.off { background: var(--danger-tint); color: var(--danger); }
    .pill { font-size: 11px; font-weight: 650; padding: 2px 10px; border-radius: 20px; }
    .pill.ok { background: var(--primary-tint); color: var(--primary-tint-fg); }
    .pill.warn { background: var(--warn-bg); color: var(--warn-fg); }

    /* ---------- forms ---------- */
    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--fg); }
    .field input, .field select, .field textarea {
      width: 100%; height: 40px; padding: 0 12px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); font-size: 15px; line-height: 20px; font-family: inherit;
      color: var(--fg); background: var(--card); transition: border-color .15s, box-shadow .15s;
    }
    .field textarea { height: auto; padding: 10px 12px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus,
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,107,59,.13);
    }
    .toggle-row { display: flex; align-items: center; gap: 9px; padding: 7px 0; font-size: 13px; cursor: pointer; }
    .toggle-row input { width: 17px; height: 17px; accent-color: var(--primary); flex: none; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .row-flex { display: flex; align-items: center; gap: 8px; }
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      margin: 20px 0 10px; color: var(--muted-fg); }
    hr { border: 0; border-top: 1px solid var(--border); margin: 16px 0; }
    .muted { color: var(--muted-fg); font-size: 12px; }

    /* editor rows */
    .acct-row { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
    .acct-row input { height: 38px; }
    .recip-row { display: grid; grid-template-columns: 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
    .recip-row input { height: 38px; }
    .txn-add { display: grid; grid-template-columns: 1fr 1fr 1fr .8fr .8fr auto; gap: 8px; align-items: center; }
    .txn-add input, .txn-add select { height: 38px; }

    /* transactions list */
    .txn-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .txn-item:last-child { border-bottom: 0; }
    .txn-item .amt { font-weight: 650; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .txn-item .amt.pos { color: var(--success); }
    .txn-item .amt.neg { color: var(--danger); }

    /* approvals */
    .appr-item { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .appr-item:first-child { padding-top: 2px; }
    .appr-item:last-child { border-bottom: 0; padding-bottom: 2px; }
    .appr-main { flex: 1; min-width: 220px; }
    .appr-kind { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
      background: var(--primary-tint); color: var(--primary-tint-fg); padding: 2px 8px; border-radius: 20px; }
    .appr-meta { color: var(--muted-fg); font-size: 12px; margin-top: 4px; }
    .appr-amt { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 15px; }
    .appr-amt.in { color: var(--success); }
    .appr-amt.out { color: var(--danger); }
    .appr-actions { display: flex; gap: 8px; }
    .approvals-empty, .empty { color: var(--muted-fg); font-size: 13px; padding: 8px 0; }
    .empty { text-align: center; padding: 48px 0; }

    /* avatar editor */
    .avatar-edit { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .avatar-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: var(--muted); border: 1px solid var(--border-strong); flex: none; }
    .avatar-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .hidden-file { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }
    .avatar-hint { margin-top: 6px; }

    /* toast */
    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      background: var(--fg); color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 13px;
      font-weight: 550; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 90;
      box-shadow: 0 8px 30px rgba(0,0,0,.18); }
    .toast.show { opacity: 1; }
    .toast.err { background: var(--danger); }

    /* mobile drawer backdrop */
    .sb-backdrop { display: none; }

    /* ---------- responsive ---------- */
    @media (max-width: 900px) {
      .sidebar { position: fixed; left: 0; top: 0; height: 100vh; transform: translateX(-100%);
        transition: transform .22s ease; box-shadow: 0 12px 44px rgba(0,0,0,.22); }
      .app.nav-open .sidebar { transform: none; }
      .sb-backdrop { display: block; position: fixed; inset: 0; background: rgba(12,22,17,.42);
        opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 55; }
      .app.nav-open .sb-backdrop { opacity: 1; pointer-events: auto; }
      .menu-btn { display: inline-flex; align-items: center; justify-content: center; }
      .users-layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 680px) {
      .content { padding: 16px; }
      .grid2 { grid-template-columns: 1fr; }
      .acct-row { grid-template-columns: 1fr 1fr; }
      .acct-row .a-name { grid-column: 1 / -1; }
      .recip-row { grid-template-columns: 1fr 36px; }
      .recip-row .r-name { grid-column: 1 / -1; }
      .txn-add { grid-template-columns: 1fr 1fr; }
      .txn-add .btn { grid-column: 1 / -1; }
    }
    @media (max-width: 420px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-head">
        <img src="/assets/img/logo.png" alt="Alliance Federal Credit Union">
        <span class="tag">Admin</span>
      </div>
      <nav class="sb-nav">
        <div class="sb-label">Manage</div>
        <button class="nav-item active" data-view="overview"><i class="fas fa-tachometer-alt"></i> Overview</button>
        <button class="nav-item" data-view="users"><i class="fas fa-users"></i> Users</button>
        <button class="nav-item" data-view="settings"><i class="fas fa-cog"></i> Settings</button>
      </nav>
      <div class="sb-foot">
        <div class="avatar-mini" id="admin-initial">A</div>
        <div class="who">
          <div class="nm" id="admin-name">Admin</div>
          <div class="rl">Administrator</div>
        </div>
        <button class="btn btn-light btn-sm" id="logout-btn" title="Log out"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </aside>
    <div class="sb-backdrop" id="sb-backdrop"></div>

    <!-- main -->
    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <h1 class="page-title" id="page-title">Overview</h1>
        <span class="sp"></span>
        <span class="who-name" id="topbar-name"></span>
      </header>

      <div class="content">
        <!-- OVERVIEW -->
        <section class="view active" id="view-overview">
          <div class="stats" id="stats"></div>
          <div class="card" id="approvals-card">
            <div class="card-head">
              <h3>Pending approvals <span id="approvals-count" class="badge admin"></span></h3>
              <button class="btn btn-light btn-sm" id="approvals-refresh"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div id="approvals-list"><div class="approvals-empty">Loading…</div></div>
          </div>
        </section>

        <!-- USERS -->
        <section class="view" id="view-users">
          <div class="users-layout">
            <div class="card">
              <div class="card-head">
                <h3>Users</h3>
                <button class="btn btn-primary btn-sm" id="new-user-btn"><i class="fas fa-user-plus"></i> New</button>
              </div>
              <ul class="userlist" id="user-list"></ul>
            </div>
            <div class="card" id="editor">
              <div class="empty">Select a user to edit, or create a new one.</div>
            </div>
          </div>
        </section>

        <!-- SETTINGS -->
        <section class="view" id="view-settings">
          <div class="card" id="security-card">
            <div class="approvals-empty">Loading login security…</div>
          </div>
          <div class="card" id="email-card">
            <div class="approvals-empty">Loading email settings…</div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/admin.js"></script>
</body>
</html>
